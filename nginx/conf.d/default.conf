upstream backend {
    server 127.0.0.1:3001;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name cocolh.top www.cocolh.top;
    return 301 https://$host$request_uri;
}

# HTTPS 服务
server {
    listen 443 ssl;
    http2 on;
    server_name cocolh.top www.cocolh.top;

    ssl_certificate /etc/letsencrypt/live/cocolh.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cocolh.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 后端 API — /api → 完整路径转发到后端
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 管理后台 SPA — /admin
    location /admin {
        alias /usr/share/nginx/html/admin/;
        try_files $uri /admin/index.html;
    }

    # 上传文件
    location /uploads {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 根路径重定向到后台
    location = / {
        return 301 https://$host/admin;
    }
}
