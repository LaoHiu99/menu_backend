services:
  mysql:
    image: mysql:8.0
    container_name: menu_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-sangon@He}
      MYSQL_DATABASE: ${DB_DATABASE:-menu_system}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-sangon@He}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - menu_network

  backend:
    image: menu_backend:1.0.0
    build:
      context: .
      dockerfile: Dockerfile
    container_name: menu_backend
    restart: always
    environment:
      PORT: ${PORT:-3001}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-sangon@He}
      DB_DATABASE: ${DB_DATABASE:-menu_system}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      WX_APPID: ${WX_APPID}
      WX_APP_SECRET: ${WX_APP_SECRET}
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/category',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - menu_network

  nginx:
    image: nginx:stable
    container_name: menu_nginx
    restart: always
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ../menu_admin/dist:/usr/share/nginx/html/admin:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
  uploads_data:

networks:
  menu_network:
    driver: bridge
